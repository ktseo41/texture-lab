<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEXTURE LAB — halftone / grain</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23111'/%3E%3Ccircle cx='5' cy='5' r='2.4' fill='%23f7d500'/%3E%3Ccircle cx='11' cy='5' r='1.7' fill='%2300adee'/%3E%3Ccircle cx='5' cy='11' r='1.7' fill='%23ec008c'/%3E%3Ccircle cx='11' cy='11' r='2.4' fill='%23fff'/%3E%3C/svg%3E">
</head>
<body data-theme="brutal">

<div id="stage">
  <canvas id="view"></canvas>
  <div id="busy">RENDERING…</div>
</div>

<div id="panel">
  <header id="masthead">
    <h1>TEXTURE<br>LAB<span class="cursor">_</span></h1>
    <p class="sub">CMYK HALFTONE · PRINT GRUNGE · GRAIN GRADIENT</p>
    <div id="themeSwitch" role="tablist" aria-label="테마">
      <button data-t="brutal" class="on">BRUTAL</button>
      <button data-t="instrument">PANEL</button>
    </div>
  </header>

  <div class="toolbar">
    <select id="preset" aria-label="프리셋"></select>
    <div class="btnrow">
      <button id="rndSeed" title="시드 랜덤화">SEED ⟳</button>
      <button id="share" title="현재 설정을 URL로 복사">LINK</button>
      <button id="saveJson" title="프리셋 JSON 저장">JSON↓</button>
      <button id="loadJson" title="프리셋 JSON 불러오기">JSON↑</button>
      <button id="export" class="primary">PNG↓</button>
    </div>
    <input type="file" id="jsonFile" accept="application/json" hidden>
  </div>

  <details open>
    <summary><span class="idx">01</span>캔버스 / 시드</summary>
    <div class="grp" id="g-canvas"></div>
  </details>

  <details open>
    <summary><span class="idx">02</span>소스 (베이스 이미지)</summary>
    <div class="grp" id="g-source"></div>
    <div class="grp">
      <div class="row"><label>이미지 업로드</label><input type="file" id="upload" accept="image/*" class="file"></div>
    </div>
  </details>

  <details open>
    <summary><span class="idx">03</span>할프톤 스크린</summary>
    <div class="grp" id="g-halftone"></div>
    <div class="grp">
      <div class="hint">채널별 스크린 각도와 판 어긋남 오프셋. 인쇄 표준: C=15° M=75° Y=0° K=45°</div>
      <div class="chhead"><span></span><span>INK</span><span>ANG°</span><span>OFF-X</span><span>OFF-Y</span></div>
      <div id="channels"></div>
    </div>
  </details>

  <details open>
    <summary><span class="idx">04</span>그런지 / 왜곡</summary>
    <div class="grp" id="g-grunge"></div>
  </details>

  <details open>
    <summary><span class="idx">05</span>그레인</summary>
    <div class="grp" id="g-grain"></div>
  </details>

  <footer id="statusbar">
    <span id="stat-size">1200×800</span>
    <span id="stat-seed">SEED 7</span>
    <span id="stat-time">— ms</span>
  </footer>
</div>

<div id="toast" hidden></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
